name: Build and Release (Windows)

on:
  push:
    tags:
      - 'v*-win'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore windows/DeSicaBar.csproj

      - name: Publish
        run: >
          dotnet publish windows/DeSicaBar.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o windows/publish

      - name: Copy audio clips
        run: xcopy assets\clips windows\publish\clips\ /E /I /Y

      - name: Create ZIP
        run: >
          Compress-Archive
          -Path windows/publish/*
          -DestinationPath DeSicaBar-${{ github.ref_name }}.zip

      - name: Compute SHA256
        id: sha256
        run: |
          $hash = (Get-FileHash "DeSicaBar-${{ github.ref_name }}.zip" -Algorithm SHA256).Hash.ToLower()
          echo "hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DeSicaBar-${{ github.ref_name }}.zip
          body: |
            🎄 De Sica Bar ${{ github.ref_name }} — Windows

            System tray app Windows con 13 clip audio iconici di Cristian De Sica + supporto per suoni personalizzati.

            ## 📦 Installazione
            1. Scarica `DeSicaBar-${{ github.ref_name }}.zip` qui sotto
            2. Estrai in una cartella a piacere (es. `C:\Program Files\DeSicaBar`)
            3. Avvia `DeSicaBar.exe`
            4. L'icona panettone appare nella system tray (angolo in basso a destra)

            > ⚠️ **Primo avvio — SmartScreen:** Windows potrebbe mostrare "Windows ha protetto il PC".
            > Clicca **"Ulteriori informazioni"** → **"Esegui comunque"**.
            > Questo avviene perché l'app non ha una firma digitale a pagamento — è normale per i progetti open source gratuiti.

            ## ✨ Features
            - 13 clip audio con shortcut globali `Ctrl+Alt+1` … `Ctrl+Alt+0`, `Ctrl+Alt+-`, `Ctrl+Alt+=`, `Ctrl+Alt+[`
            - Caricamento suoni personalizzati via file picker
            - Durata max 30s per clip, toggle start/stop
            - Avvia con Windows (opzionale)

            ## ⚙️ Requisiti
            Windows 10/11 x64 — nessuna dipendenza esterna (.NET runtime incluso)

            **sha256:** `${{ steps.sha256.outputs.hash }}`
