name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: bash build.sh

      - name: Zip app
        run: zip -r DeSicaBar.zip DeSicaBar.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DeSicaBar.zip
          generate_release_notes: true
